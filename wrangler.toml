# BDSManager — Cloudflare Pages wrangler config
# Použitie:
#   npm run pages:preview  → lokálny preview po next-on-pages buildi
#   npm run pages:deploy   → deploy do Cloudflare Pages
#
# Production env vars sa nastavujú v Cloudflare dashboard:
#   Pages → bdsmanager → Settings → Environment variables → Production:
#     NEXT_PUBLIC_SUPABASE_URL
#     NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#     SUPABASE_SECRET_KEY                 (encrypted)
#     NEXT_PUBLIC_APP_URL                 (napr. https://bdsmanager.pages.dev)
#     BOOTSTRAP_ADMIN_EMAIL
#     BOOTSTRAP_ADMIN_NAME

name = "bdsmanagerr"
compatibility_date = "2026-05-29"
# nodejs_compat — povolí Node built-ins (Buffer, crypto, ...) v Workers runtime.
# Niektoré Supabase deps to potrebujú.
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

# ─── Runtime + Build env vars ──────────────────────────────────────────
# Tieto sa picknu pri build (NEXT_PUBLIC_* inline) aj v runtime Workers.
# Secret values (service role key) sa NEdávajú sem — sú v CF Pages dashboard
# → Settings → Environment variables → Secret (SUPABASE_SECRET_KEY).
#
# NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY je verejný — Supabase je designed
# aby anon/publishable kľúč mohol byť v client bundle.
[vars]
NODE_VERSION = "20"
NEXT_PUBLIC_SUPABASE_URL = "https://wzcehdynanuuzztfrqyi.supabase.co"
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable__1punPgjgE97um8_t4Ul-w_TeS6C1RR"
BOOTSTRAP_ADMIN_EMAIL = "info@epoxidovo.sk"
META_WEBHOOK_VERIFY_TOKEN = "epoxidovo_meta_xK9pQ2vN8r"
